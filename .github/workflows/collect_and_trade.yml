name: 自動売買Bot実行 (15分間隔)

on:
  schedule:
    # 15分おき、時間境界(:00/:15/:30/:45)を避けたオフセット。
    # GitHub Free tier の schedule は境界時刻に集中して数時間遅延するため、
    # :03/:18/:33/:48 の奇数オフセットで遅延を回避。
    - cron: "3,18,33,48 * * * *"
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write  # DBファイルをコミットするため

jobs:
  run-bots:
    runs-on: ubuntu-latest
    timeout-minutes: 8  # ML学習 (#09) 込みで余裕を確保

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt

      - name: Bot実行
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/run_bots.py

      - name: DB変更をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/*.db || true
          git add -f data/*.sqlite* || true
          git add -f models/ || true
          git diff --cached --quiet || git commit -m "🤖 bot実行結果を保存 $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main || true
          git push || echo "Push failed (conflict), will retry next run"

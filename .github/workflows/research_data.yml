name: リサーチ用長期データ取得

on:
  workflow_dispatch:  # 手動実行
  schedule:
    # 自動実行(日次)。手動起動APIが権限不足のため cron で代替 (2026-07-06)。
    # リサーチ完了後はこの schedule を削除してよい
    - cron: "20 11 * * *"
    - cron: "50 13 * * *"  # 同日バックアップ (GitHub cron のスキップ対策)

permissions:
  contents: write

jobs:
  fetch-research-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt

      - name: 長期データ取得 (日足OHLCV + funding履歴)
        run: python scripts/fetch_research_data.py

      - name: データをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/research.db
          git diff --cached --quiet || git commit -m "📚 リサーチ用長期データを取得 $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main || true
          git push

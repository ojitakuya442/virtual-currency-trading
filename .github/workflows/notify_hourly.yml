name: Hourly Trade Notification

on:
  schedule:
    # 毎時11分に実行 (時間境界 :00 に集中すると Actions scheduler が遅延するため回避)
    - cron: '11 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Hourly Notification
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python src/notify_hourly.py

      - name: Export Dashboard Data
        run: |
          python src/export_dashboard.py

      - name: Commit and Push Dashboard Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard.json
          git commit -m "update: dashboard data [skip ci]" || echo "No changes to commit"
          git push
